<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 소비 코치</title>
<style>
body {font-family: Arial; background:#FFF5F7; margin:0; padding:40px;}
.container {max-width:600px; margin:auto; background:white; padding:30px; border-radius:25px; box-shadow:0 8px 20px rgba(0,0,0,0.08);} 
h1{text-align:center; color:#FF8FA3; margin-bottom:30px;}
input[type=number]{width:100%; padding:12px; border-radius:12px; border:1px solid #eee; margin-bottom:20px;}
.slider-box{margin:25px 0;}
.slider-box label{display:flex; justify-content:space-between; margin-bottom:8px;}
input[type=range]{width:100%;}
.result{margin-top:25px; padding:20px; background:#F8FFF9; border-radius:20px;}
button{width:100%; padding:12px; margin-top:15px; border:none; border-radius:12px; background:#FFB6C1; color:white; font-size:16px; cursor:pointer;}
</style>
</head>
<body>

<div class="container">
<h1>💸 나의 소비 코치</h1>

<label>월 예산 입력</label>
<input type="number" id="budget">

<div class="slider-box">
<label>🍙 식비 <span id="foodP">30%</span></label>
<input type="range" id="food" value="30" oninput="update()">
</div>

<div class="slider-box">
<label>☕ 카페 <span id="cafeP">20%</span></label>
<input type="range" id="cafe" value="20" oninput="update()">
</div>

<div class="slider-box">
<label>🛍 쇼핑 <span id="shopP">20%</span></label>
<input type="range" id="shop" value="20" oninput="update()">
</div>

<div class="slider-box">
<label>🚇 교통 <span id="transP">15%</span></label>
<input type="range" id="trans" value="15" oninput="update()">
</div>

<div class="slider-box">
<label>🎀 기타 <span id="etcP">15%</span></label>
<input type="range" id="etc" value="15" oninput="update()">
</div>

<p style="text-align:center; color:#999;">👉 나머지 비율은 자동 계산됩니다</p>

<button onclick="calculate()">계산하기</button>
<button onclick="goCalendar()">📅 소비 달력 보기</button>

<div class="result" id="result"></div>
</div>

<script>
function update(){
 const food = +document.getElementById('food').value;
 const cafe = +document.getElementById('cafe').value;
 const shop = +document.getElementById('shop').value;
 const trans = +document.getElementById('trans').value;

 let etc = 100 - (food + cafe + shop + trans);
 etc = Math.max(0, etc);
 document.getElementById('etc').value = etc;

 document.getElementById('foodP').innerText = food+'%';
 document.getElementById('cafeP').innerText = cafe+'%';
 document.getElementById('shopP').innerText = shop+'%';
 document.getElementById('transP').innerText = trans+'%';
 document.getElementById('etcP').innerText = etc+'%';
}

function calculate(){
 const budget = document.getElementById('budget').value;
 if(!budget) return alert('예산 입력!');

 const food = budget * document.getElementById('food').value / 100;
 const cafe = budget * document.getElementById('cafe').value / 100;
 const shop = budget * document.getElementById('shop').value / 100;
 const trans = budget * document.getElementById('trans').value / 100;
 const etc = budget * document.getElementById('etc').value / 100;

 document.getElementById('result').innerHTML = `
 🍙 식비: ${Math.round(food)}원 (하루 ${Math.round(food/30)}원)<br>
 ☕ 카페: ${Math.round(cafe)}원 (하루 ${Math.round(cafe/30)}원)<br>
 🛍 쇼핑: ${Math.round(shop)}원 (월)<br>
 🚇 교통: ${Math.round(trans)}원 (월)<br>
 🎀 기타: ${Math.round(etc)}원 (월)
 `;
}

function goCalendar(){
 const budget = document.getElementById('budget').value;
 const food = document.getElementById('food').value;
 const cafe = document.getElementById('cafe').value;

 window.location.href = `calendar.html?budget=${budget}&food=${food}&cafe=${cafe}`;
}
</script>

</body>
</html>
